<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麦克风测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0a0a14;color:#d0d0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.test-card{background:#0f0f23;border:1px solid #1f1f40;border-radius:16px;padding:32px;max-width:560px;width:100%}
h2{font-size:22px;margin-bottom:20px;text-align:center}
.device-info{background:#151530;border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px}
.device-info select{width:100%;background:#0f0f23;color:#fff;border:1px solid #1f1f40;padding:8px;border-radius:6px;margin-top:8px;font-size:13px}
.status{font-size:15px;padding:12px 16px;border-radius:8px;margin:12px 0;background:#151530;text-align:center}
.status.ok{background:rgba(0,200,100,.12);color:#0c8}
.status.err{background:rgba(255,60,60,.12);color:#f55}
.status.warn{background:rgba(255,180,0,.12);color:#fa0}
.bar-container{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:100px;margin:16px 0}
.bar{width:7px;background:linear-gradient(to top,#00d4ff,#7b2fff);border-radius:3px;transition:height .06s}
.volume-text{font-size:12px;color:#707090;text-align:center}
.btn-row{display:flex;gap:10px;justify-content:center;margin:16px 0;flex-wrap:wrap}
button{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.btn-test{background:linear-gradient(135deg,#00d4ff,#7b2fff);color:#fff}
.btn-test:hover{box-shadow:0 0 20px rgba(0,212,255,.4)}
.btn-stop{background:#ff2d95;color:#fff}
.btn-stop:hover{box-shadow:0 0 20px rgba(255,45,149,.4)}
.btn-record{background:linear-gradient(135deg,#ff2d95,#ff6600);color:#fff}
.btn-record.recording{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.tips{font-size:12px;color:#707090;line-height:2;margin-top:12px;background:#151530;border-radius:8px;padding:14px 18px}
.tips strong{color:#00d4ff}
.playback-audio{margin-top:12px;width:100%;display:none}
</style>
</head>
<body>
<div class="test-card">
  <h2>🎤 麦克风诊断</h2>

  <div class="device-info">
    <strong>📋 检测到的输入设备：</strong>
    <select id="deviceSelect" onchange="switchDevice()">
      <option>点击"开始测试"后刷新列表...</option>
    </select>
  </div>

  <div class="status" id="status">点击下方按钮开始</div>

  <div class="bar-container" id="bars"></div>
  <div class="volume-text" id="volumeText"></div>

  <div class="btn-row">
    <button class="btn-test" id="btnTest" onclick="startTest()">🎤 音量测试</button>
    <button class="btn-record" id="btnRecord" onclick="toggleRecord()">🔴 录音回放</button>
    <button class="btn-stop" id="btnStop" onclick="stopAll()" style="display:none">⏹ 停止</button>
  </div>

  <audio class="playback-audio" id="playback" controls></audio>

  <div class="tips">
    <strong>🔧 音量条不动？</strong><br>
    ① <strong>Win+I</strong> → 隐私和安全性 → 麦克风 → 确保 <strong>"麦克风访问"已开启</strong><br>
    ② 检查 <strong>"允许应用访问麦克风"</strong> 是否打开<br>
    ③ 确认 Chrome/Edge 在列表中且 <strong>开关为 ON</strong><br>
    ④ 右键任务栏 🔊 → <strong>声音设置</strong> → 输入 → 选对设备 → 对着麦说话看进度条<br>
    ⑤ 如果用的<strong>蓝牙耳机</strong>，检查是否选到了 "Hands-Free" 而非 "Stereo"<br>
    ⑥ 如果用的<strong>外接摄像头麦克风</strong>，检查 USB 口是否接触不良
  </div>
</div>

<script>
let audioCtx = null, analyser = null, micStream = null, animId = null;
let mediaRecorder = null, recordedChunks = [];
let isRecording = false;

// 音量条
const barsContainer = document.getElementById('bars');
for(let i=0;i<32;i++){
  const bar = document.createElement('div'); bar.className='bar'; bar.style.height='4px';
  barsContainer.appendChild(bar);
}

function setStatus(msg, type){
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status '+(type||'');
}

// 列出设备
async function listDevices(){
  try{
    // 先请求权限拿到设备标签
    const tmp = await navigator.mediaDevices.getUserMedia({audio:true});
    tmp.getTracks().forEach(t=>t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d=>d.kind==='audioinput');
    const sel = document.getElementById('deviceSelect');
    sel.innerHTML = '';
    if(inputs.length===0){
      sel.innerHTML = '<option>未检测到任何麦克风设备</option>';
    } else {
      inputs.forEach((d,i)=>{
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = (d.label || '麦克风 #'+(i+1)) + (i===0?' (默认)':'');
        sel.appendChild(opt);
      });
    }
  }catch(e){
    document.getElementById('deviceSelect').innerHTML = '<option>无法获取设备列表（权限未授予）</option>';
  }
}

async function switchDevice(){
  if(micStream){
    stopAll();
    await startTest();
  }
}

async function startTest(){
  stopAll();
  setStatus('正在请求麦克风权限...');

  const deviceId = document.getElementById('deviceSelect').value;

  try{
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: deviceId ? {deviceId:{exact:deviceId}} : true
    });

    // 列出设备
    await listDevices();

    // 检查音轨
    const track = micStream.getAudioTracks()[0];
    if(!track){
      setStatus('❌ 无法获取音频轨道', 'err');
      return;
    }
    console.log('使用设备:', track.label, '状态:', track.readyState);

    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    let maxEver = 0;

    setStatus('✅ 麦克风: '+track.label+' — 请对着麦克风说话！', 'ok');
    document.getElementById('btnStop').style.display = 'inline-block';

    function updateBars(){
      analyser.getByteFrequencyData(dataArray);
      const bars = barsContainer.children;
      let total = 0;
      for(let i=0;i<32;i++){
        const val = dataArray[Math.floor(i*bufferLength/32)];
        bars[i].style.height = Math.max(3, val*1.1) + 'px';
        total += val;
      }
      const avg = total/32;
      if(avg > maxEver) maxEver = avg;
      const vol = document.getElementById('volumeText');

      if(maxEver < 3){
        vol.textContent = '⚠ 完全没有声音信号 — 检查麦克风是否静音或选错设备';
        vol.style.color = '#fa0';
      } else if(avg > 8){
        vol.textContent = '音量: '+(avg/2.56).toFixed(0)+'% — 麦克风正常 👍';
        vol.style.color = '#0c8';
      } else {
        vol.textContent = '音量: 很低 ('+(avg/2.56).toFixed(0)+'%) — 但能检测到声音，请靠近说话';
        vol.style.color = '#707090';
      }
      animId = requestAnimationFrame(updateBars);
    }
    updateBars();

  }catch(err){
    console.error(err);
    if(err.name==='NotAllowedError'){
      setStatus('❌ 权限被拒绝。请在浏览器地址栏左侧点击锁图标 → 允许麦克风', 'err');
    } else if(err.name==='NotFoundError'){
      setStatus('❌ 未检测到麦克风。请确认设备已连接', 'err');
    } else {
      setStatus('❌ '+err.message, 'err');
    }
  }
}

// 录音回放测试
async function toggleRecord(){
  if(isRecording){
    // 停止录音
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('btnRecord').textContent = '🔴 录音回放';
    document.getElementById('btnRecord').classList.remove('recording');
    setStatus('处理录音中...');
    return;
  }

  if(!micStream){
    // 先获取麦克风
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(e){
      setStatus('❌ 无法访问麦克风: '+e.message, 'err');
      return;
    }
  }

  recordedChunks = [];
  try{
    mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(recordedChunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      const audio = document.getElementById('playback');
      audio.src = url;
      audio.style.display = 'block';
      setStatus('✅ 录音完成！点击下方播放按钮回听', 'ok');
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('btnRecord').textContent = '⏹ 停止录音';
    document.getElementById('btnRecord').classList.add('recording');
    setStatus('🔴 正在录音...请说话，说完点"停止录音"', 'warn');
  }catch(e){
    setStatus('❌ 录音失败: '+e.message, 'err');
    console.error(e);
  }
}

function stopAll(){
  if(animId) cancelAnimationFrame(animId);
  if(mediaRecorder && isRecording){ mediaRecorder.stop(); isRecording = false; }
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=null; analyser=null; micStream=null; animId=null;
  document.getElementById('btnRecord').textContent = '🔴 录音回放';
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnStop').style.display = 'none';
  const bars = barsContainer.children;
  for(let i=0;i<bars.length;i++) bars[i].style.height = '4px';
}
</script>
</body>
</html>
